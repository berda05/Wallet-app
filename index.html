<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6C5CE7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Novčanik" />
  <title>Novčanik — Spending Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- App header -->
    <header class="app-header" id="appHeader">
      <div class="header-row">
        <h1 class="view-title" id="viewTitle">Pregled</h1>
        <div class="header-actions">
          <button class="icon-btn" id="themeToggle" title="Tema" aria-label="Tema">🌙</button>
          <button class="icon-btn" id="settingsBtn" title="Podešavanja" aria-label="Podešavanja">⚙️</button>
        </div>
      </div>
    </header>

    <!-- Main scrollable content -->
    <main id="main" class="main">
      <section class="view" id="view-dashboard"></section>
      <section class="view hidden" id="view-transactions"></section>
      <section class="view hidden" id="view-bills"></section>
      <section class="view hidden" id="view-goals"></section>
      <section class="view hidden" id="view-stats"></section>
    </main>

    <!-- Floating add button -->
    <button class="fab" id="fab" aria-label="Dodaj">
      <svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
    </button>

    <!-- Bottom tab bar -->
    <nav class="tabbar" id="tabbar">
      <button class="tab active" data-view="dashboard">
        <span class="tab-ico">🏠</span><span class="tab-lbl" data-i18n="tab.dashboard">Pregled</span>
      </button>
      <button class="tab" data-view="transactions">
        <span class="tab-ico">💳</span><span class="tab-lbl" data-i18n="tab.transactions">Transakcije</span>
      </button>
      <span class="tab-spacer"></span>
      <button class="tab" data-view="bills">
        <span class="tab-ico">🧾</span><span class="tab-lbl" data-i18n="tab.bills">Računi</span>
      </button>
      <button class="tab" data-view="goals">
        <span class="tab-ico">🎯</span><span class="tab-lbl" data-i18n="tab.goals">Ciljevi</span>
      </button>
    </nav>
  </div>

  <!-- Modal container -->
  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal-sheet" id="modalSheet" role="dialog" aria-modal="true"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/i18n.js"></script>
  <script src="js/store.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
